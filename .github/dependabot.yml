version: 2
updates:
  # GitHub Actions are the only Dependabot-supported ecosystem in a Terragrunt
  # repo. Dependabot's `terraform` ecosystem reads `*.tf` files for
  # `required_providers` / module `source` blocks; it does NOT scan `.hcl`
  # files. Module sources here live in terragrunt.hcl, so the previous
  # per-env terraform configs were no-ops and only generated noise.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
