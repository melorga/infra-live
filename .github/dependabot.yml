version: 2
updates:
  # Keep GitHub Actions (including the reusable workflow ref) current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"

  # Terraform providers/modules per environment. Dependabot scans for
  # `required_providers` and module `source` pins under each directory.
  - package-ecosystem: "terraform"
    directory: "/dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "terraform"
      - "env:dev"

  - package-ecosystem: "terraform"
    directory: "/stage"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "terraform"
      - "env:stage"

  - package-ecosystem: "terraform"
    directory: "/prod"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "terraform"
      - "env:prod"
