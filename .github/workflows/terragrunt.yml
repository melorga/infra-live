name: Live Infrastructure CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'dev/**'
      - 'stage/**'
      - 'prod/**'
      - 'terragrunt.hcl'
      - '.github/workflows/terragrunt.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dev/**'
      - 'stage/**'
      - 'prod/**'
      - 'terragrunt.hcl'
      - '.github/workflows/terragrunt.yml'

# OIDC requires id-token: write. contents: read for checkout, and
# pull-requests: write so the reusable workflow can post plan output.
permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TERRAGRUNT_VERSION: '1.0.3'
  TERRAFORM_VERSION: '1.15.1'

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      dev-changed: ${{ steps.changes.outputs.dev }}
      stage-changed: ${{ steps.changes.outputs.stage }}
      prod-changed: ${{ steps.changes.outputs.prod }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          # On PRs, diff against the base ref. On push to main, diff against the prior commit.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1
          else
            BASE="HEAD~1"
          fi

          changed() { git diff --name-only "$BASE" HEAD | grep -E "^$1/" >/dev/null; }

          for env in dev stage prod; do
            if changed "$env"; then
              echo "$env=true"  >> "$GITHUB_OUTPUT"
            else
              echo "$env=false" >> "$GITHUB_OUTPUT"
            fi
          done

          # Root terragrunt.hcl change re-plans everything
          if git diff --name-only "$BASE" HEAD | grep -E '^terragrunt\.hcl$' >/dev/null; then
            echo "dev=true"   >> "$GITHUB_OUTPUT"
            echo "stage=true" >> "$GITHUB_OUTPUT"
            echo "prod=true"  >> "$GITHUB_OUTPUT"
          fi

  dev:
    name: Development Environment
    needs: detect-changes
    if: needs.detect-changes.outputs.dev-changed == 'true'
    concurrency:
      group: terragrunt-dev-${{ github.ref }}
      cancel-in-progress: false
    # Pinned to a specific commit on gha-workflows for reproducibility.
    # Bump after merging the gha-workflows audit branch and cutting a tag.
    # Plan/apply gating happens inside the callee based on event_name (PR=plan, push=apply).
    uses: melorga/gha-workflows/.github/workflows/terragrunt.yml@f076d348da88dea26498a45ce537e3b074d6aa4c
    with:
      terragrunt_version: '1.0.3'
      terraform_version: '1.15.1'
      working_directory: './dev/us-east-1'
      environment: 'development'
      aws_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}

  stage:
    name: Staging Environment
    needs: [detect-changes, dev]
    if: needs.detect-changes.outputs.stage-changed == 'true' && (success() || needs.dev.result == 'skipped')
    concurrency:
      group: terragrunt-stage-${{ github.ref }}
      cancel-in-progress: false
    uses: melorga/gha-workflows/.github/workflows/terragrunt.yml@f076d348da88dea26498a45ce537e3b074d6aa4c
    with:
      terragrunt_version: '1.0.3'
      terraform_version: '1.15.1'
      working_directory: './stage/us-east-1'
      environment: 'staging'
      aws_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}

  prod:
    name: Production Environment
    needs: [detect-changes, stage]
    if: needs.detect-changes.outputs.prod-changed == 'true' && (success() || needs.stage.result == 'skipped')
    # Gate prod applies behind the `production` GitHub Environment.
    # Configure required reviewers there (Settings -> Environments).
    concurrency:
      group: terragrunt-prod-${{ github.ref }}
      cancel-in-progress: false
    uses: melorga/gha-workflows/.github/workflows/terragrunt.yml@f076d348da88dea26498a45ce537e3b074d6aa4c
    with:
      terragrunt_version: '1.0.3'
      terraform_version: '1.15.1'
      working_directory: './prod/us-east-1'
      environment: 'production'
      aws_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
